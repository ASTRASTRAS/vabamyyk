<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="utf-8">
<title>Eesti Sekkarite Kaart</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  width: 100%;
  height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<script>

// ⭐ 1. KAART
const map = L.map('map').setView([58.7, 25.0], 7);

// ⭐ 2. OPENSTREETMAP
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// ⭐ 3. GOOGLE SHEETS CSV (SINU LINK)
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJnBTGUcESoMf7GV4h9oZs9FgVvw_mS1o4xp79WaP7zGKD1lHwuQp3iPVYnTWrMRMKCxUrN7uA0VAX/pub?output=csv";

// ⭐ 4. LAE ANDMED (ÕIGE CSV PARSING)
Papa.parse(csvURL, {
  download: true,
  header: true,
  skipEmptyLines: true,

  complete: function(results) {

    console.log("CSV andmed:", results.data);

    results.data.forEach(row => {

      const lat = parseFloat(row.Latitude);
      const lng = parseFloat(row.Longitude);

      if (isNaN(lat) || isNaN(lng)) return;

      const name = row.Nimi || "Nimetu";
      const addr = row.Aadress || "";
      const time = row.Kellaaeg || "";

      L.marker([lat, lng]).addTo(map)
        .bindPopup(
          `<b>${name}</b><br>
           ${addr}<br>
           🕒 ${time}`
        );

    });

  },

  error: function(err) {
    console.error("CSV laadimine ebaõnnestus:", err);
  }

});

</script>

</body>
</html>
